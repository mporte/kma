  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{--bg:#fff;--fg:#111;--dim:#888;--accent:#e8336d}
    html,body{height:100%;overflow:hidden}
    body{background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Courier New',Courier,monospace;-webkit-font-smoothing:antialiased}
    ::selection{background:var(--accent);color:#fff}
    .block{text-align:center}
    .title{
      font-family:'Courier New',Courier,monospace;
      font-size:14px;
      line-height:1.6;
      color:var(--fg);
      opacity:0;
      transform:translateY(20px);
      animation:emergeAndFade 1.2s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }
    .enter{
      display:inline-block;
      margin:45px 0 0 0;
      font-family:'Courier New',Courier,monospace;
      font-size:11px;
      letter-spacing:.08em;
      text-transform:uppercase;
      color:var(--dim);
      text-decoration:none;
      padding:10px 0;
      position:relative;
      opacity:0;
      transform:translateY(20px);
      animation:emergeAndFade 1.0s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      transition:color .3s;
    }
    .eng { animation-delay: 0.2s; margin-bottom: 10px; }
    .ita { animation-delay: 1.0s; }
    .btn { animation-delay: 1.2s; }
    .enter::after{content:'';position:absolute;bottom:6px;left:0;width:100%;height:1px;background:var(--accent);transform:scaleX(0);transform-origin:left;transition:transform .4s cubic-bezier(.16,1,.3,1)}
    .enter:hover{color:var(--accent)}
    .enter:hover::after{transform:scaleX(1)}
    @keyframes emergeAndFade {
      0%   { opacity:0; transform:translateY(50px); }
      100% { opacity:1; transform:translateY(0); }
    }
  </style>
</head>
